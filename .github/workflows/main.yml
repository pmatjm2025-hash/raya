name: Otomatisasi Scraping DO

on:
  schedule:
    # Berjalan setiap 10 menit dari jam 08:00 - 17:50 WIB (01:00 - 10:50 UTC), Senin - Sabtu
    - cron: '*/10 1-10 * * 1-6'
  workflow_dispatch: # Tombol manual jika ingin tes jalan langsung
# SOLUSI WARNING NODE.js 20: Memaksa semua actions menggunakan Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google Chrome & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install -r **/requirements.txt; fi

    - name: Generate kunci.json dari Secrets
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > kunci.json

    - name: Jalankan Skrip Scraping
      run: |
        FILE_PATH=$(find . -name "scraping.py" -not -path "*/.*" | head -n 1)
        if [ -z "$FILE_PATH" ]; then
          echo "Error: file scraping.py tidak ditemukan di repositori ini!"
          exit 1
        else
          echo "Menjalankan file yang ditemukan di: $FILE_PATH"
          python "$FILE_PATH"
        fi
