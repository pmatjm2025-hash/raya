name: Otomatisasi Scraping DO

on:
  schedule:
    # Berjalan otomatis setiap 10 menit (Senin - Sabtu)
    # Catatan: Waktu GitHub menggunakan UTC (WIB -7 jam)
    - cron: '*/10 * * * 1-6'
  workflow_dispatch: # Tombol manual jika ingin tes jalan langsung

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Google Chrome & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate kunci.json dari Secrets
      run: |
        echo '${{ secrets.GCP_KUNCI_JSON }}' > kunci.json

    - name: Jalankan Skrip Scraping
      run: python scraping.py
